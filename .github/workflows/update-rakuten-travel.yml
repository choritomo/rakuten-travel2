name: Update Rakuten Travel data

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update-data.mjs"
      - "scripts/build-pages.mjs"
      - ".github/workflows/update-rakuten-travel.yml"
      - "package.json"

concurrency:
  group: rakuten-travel-data-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pages: write
  id-token: write

env:
  PUBLIC_SITE_URL: https://choritomo.github.io/rakuten-travel2

jobs:
  update:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update data and pages
        run: npm run update:data
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          mkdir -p /tmp/generated-travel
          cp -R data drafts themes /tmp/generated-travel/
          [ -f robots.txt ] && cp robots.txt /tmp/generated-travel/robots.txt
          [ -f sitemap.xml ] && cp sitemap.xml /tmp/generated-travel/sitemap.xml

          git fetch origin main
          git reset --hard origin/main

          rm -rf data drafts themes
          cp -R /tmp/generated-travel/data ./data
          cp -R /tmp/generated-travel/drafts ./drafts
          cp -R /tmp/generated-travel/themes ./themes
          [ -f /tmp/generated-travel/robots.txt ] && cp /tmp/generated-travel/robots.txt ./robots.txt
          [ -f /tmp/generated-travel/sitemap.xml ] && cp /tmp/generated-travel/sitemap.xml ./sitemap.xml

          npm run build:pages

          git add data/hotels.json drafts themes robots.txt sitemap.xml
          if ! git diff --staged --quiet; then
            git commit -m "chore: update rakuten travel data"
            git push
          else
            echo "No generated file changes."
          fi
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
