name: Update Rakuten Travel data

on:
  schedule:
    - cron: "10 22 * * *"
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "scripts/update-data.mjs"
      - "scripts/build-pages.mjs"
      - ".github/workflows/update-rakuten-travel.yml"
      - "package.json"

concurrency:
  group: rakuten-travel-data-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Update data and pages
        run: npm run update:data
        env:
          RAKUTEN_APPLICATION_ID: ${{ secrets.RAKUTEN_APPLICATION_ID }}
          RAKUTEN_ACCESS_KEY: ${{ secrets.RAKUTEN_ACCESS_KEY }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
          PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/hotels.json drafts themes robots.txt sitemap.xml 2>/dev/null || true
          if ! git diff --staged --quiet; then
            git commit -m "chore: update rakuten travel data"
            git pull --rebase origin main
            git push
          fi
